<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Reports | Shan Group Hospital</title>
    <meta name="description"
        content="Securely access your lab results and diagnostic reports online through our Patient Portal.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header {
            background-color: var(--primary-color);
        }

        .report-portal {
            padding: 60px 0;
            background-color: var(--bg-color);
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .login-box i {
            font-size: 4rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <section class="page-header">
        <div class="container text-center">
            <h1>Patient Portal: View Reports</h1>
            <p class="fs-11">Securely access your lab results and diagnostic reports online.</p>
        </div>
    </section>

    <section class="report-portal">
        <div class="container df-jc">
            <div class="login-box">
                <i class="fas fa-file-medical-alt"></i>
                <h3 class="text-primary mb-10 fs-18">Access Your Reports
                </h3>
                <p class="text-light mb-25">Enter your Patient ID and registered mobile
                    number to proceed.</p>
                <form
                    onsubmit="event.preventDefault(); alert('Demo: Online Portal Login functionality would execute here.');">
                    <div class="form-group">
                        <label for="pid">Patient ID</label>
                        <input type="text" id="pid" class="form-control" placeholder="E.g. SGH-10293" required>
                    </div>
                    <div class="form-group">
                        <label for="mobile">Registered Mobile</label>
                        <input type="tel" id="mobile" class="form-control" placeholder="+91 XXXXXXXXXX" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fs-11 p-15"><i class="fas fa-lock mr-5"></i>
                        Login & View Reports</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>

</html>
