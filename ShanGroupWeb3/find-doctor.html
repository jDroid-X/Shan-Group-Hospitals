<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Doctor | Shan Group Hospital</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <section class="page-header">
        <div class="container text-center">
            <span class="hero-subtitle text-secondary">Expert Care</span>
            <h1 class="text-white">Our Leading Specialists</h1>
        </div>
    </section>

    <!-- Search Bar -->
    <section class="doctor-search">
        <div class="container">
            <div class="search-bar">
                <input type="text" placeholder="Search by doctor name..." aria-label="Search Doctor">
                <select title="Select Specialty">
                    <option value="">All Specialties</option>
                    <option value="cardiology">Cardiology</option>
                    <option value="orthopedics">Orthopedics</option>
                    <option value="gynecology">Gynecology</option>
                    <option value="internal">Internal Medicine</option>
                </select>
                <button class="btn btn-primary">Search Now</button>
            </div>
        </div>
    </section>

    <!-- Doctor Grid -->
    <section class="container doc-list">
        <div class="doc-card">
            <i class="fas fa-user-md"></i>
            <h3>Dr. Amit Sharma</h3>
            <p>Senior Cardiologist<br>15+ Years Experience</p>
            <a href="book-appointment.html" class="btn btn-primary w-100">Book Now</a>
        </div>
        <div class="doc-card">
            <i class="fas fa-user-md"></i>
            <h3>Dr. Priya Verma</h3>
            <p>Gynecologist & Obstetrician<br>10+ Years Experience</p>
            <a href="book-appointment.html" class="btn btn-primary w-100">Book Now</a>
        </div>
        <div class="doc-card">
            <i class="fas fa-user-md"></i>
            <h3>Dr. Rajeev Singh</h3>
            <p>Orthopedic Surgeon<br>12+ Years Experience</p>
            <a href="book-appointment.html" class="btn btn-primary w-100">Book Now</a>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
    </body>

</html>
