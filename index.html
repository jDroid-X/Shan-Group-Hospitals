<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shan Group Hospitals - Portfolio</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #d4af37;
            /* Gold */
            margin-bottom: 1rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .links {
            display: grid;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            background: #d4af37;
            color: #0f172a;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover {
            background: #b8962e;
            transform: translateY(-2px);
        }

        .secondary-links {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .secondary-links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .secondary-links a:hover {
            color: #d4af37;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Shan Group Hospitals</h1>
        <p>Welcome to the digital presence of Shan Group Hospitals. Select a version to view:</p>
        <div class="links">
            <a href="ShanGroupWeb3/index.html" class="btn">View Latest Website (v3)</a>
        </div>
        <div class="secondary-links">
            <a href="ShanGroupWeb2/index.html">Version 2</a>
            <a href="ShanGroupWeb/index.html">Version 1</a>
        </div>
    </div>
</body>

</html>
